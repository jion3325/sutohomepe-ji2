<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SutoServer Portal</title>
    <style>
        body { margin: 0; background-color: #050505; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { text-align: center; max-width: 800px; padding: 20px; }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 40px; }
        .card { background: #111; border: 1px solid #333; padding: 30px; border-radius: 12px; transition: 0.3s; }
        .card:hover { border-color: #38bdf8; transform: translateY(-5px); }
        .btn { display: block; margin-top: 15px; padding: 10px; background: #38bdf8; color: #050505; text-decoration: none; border-radius: 6px; font-weight: bold; }
        .ip-box { background: #1e293b; padding: 15px; border-radius: 8px; margin: 20px 0; font-family: monospace; border-left: 4px solid #38bdf8; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SutoServer</h1>
        <p>国家・アナーキー・ロビーの3つの世界へようこそ。</p>

        <div class="ip-box">
            Java: <b>sutoserver.net</b><br>
            統合版: <b>sutoserver.net</b> (Port: 19312)
        </div>

        <div class="grid">
            <div class="card">
                <h3>稼働状況</h3>
                <a href="https://status.sutoserver.net" class="btn">Statusを確認</a>
            </div>
            <div class="card">
                <h3>サーバー規定</h3>
                <a href="https://rule.sutoserver.net" class="btn">ルールを読む</a>
            </div>
            <div class="card">
                <h3>コミュニティ</h3>
                <a href="#" class="btn">Discordに参加</a>
            </div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SutoServer | Official Home</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #00ffcc;
            --nav-bg: rgba(0, 0, 0, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            background-color: var(--bg-color);
            color: white;
            text-align: center;
        }

        /* --- 固定ナビゲーションバー --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        nav a:hover {
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color);
        }

        /* --- メインコンテンツ --- */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1627398242454-45a1465c2479?auto=format&fit=crop&q=80&w=1000') center/cover;
        }

        h1 {
            font-size: clamp(2.5rem, 10vw, 5rem);
            margin: 0;
            letter-spacing: 10px;
        }

        .ip-copy {
            margin-top: 30px;
            padding: 15px 30px;
            border: 1px solid var(--accent-color);
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(0, 255, 204, 0.1);
        }

        .ip-copy:hover {
            background: var(--accent-color);
            color: black;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">HOME</a>
        <a href="anarchy.md">アナーキー鯖説明</a>
        <a href="kokka.md">国家鯖説明</a>
        <a href="rule.sutoserver.com">RULE</a>
        <a href="status.sutoserver.com">STATUS</a>
    </nav>

    <header>
        <h1>SUTOSERVER</h1>
        <p>自由か、秩序か。</p>
        <div class="ip-copy" onclick="copyIP()">IP: sutoserver.net (Click to Copy)</div>
    </header>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("sutoserver.net").then(() => {
                alert("IPアドレスをコピーしました！");
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SutoServer Portal</title>
    <style>
        body { margin: 0; background-color: #050505; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        
        /* ナビゲーションバー */
        nav { background: #111; padding: 1rem; border-bottom: 2px solid #38bdf8; display: flex; justify-content: center; gap: 20px; position: sticky; top: 0; }
        nav a { color: #38bdf8; text-decoration: none; font-weight: bold; }
        
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .section { background: #111; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        h2 { border-left: 4px solid #38bdf8; padding-left: 15px; }
        .btn { display: inline-block; padding: 10px 20px; background: #38bdf8; color: #050505; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#recruit">運営募集</a>
        <a href="#blog">Admin日記</a>
        <a href="#staff">運営紹介</a>
    </nav>

    <div class="container">
        <section id="home">
            <h1>SutoServer Portal</h1>
            <p>国家・アナーキー・ロビー鯖の管理ポータルへようこそ。</p>
        </section>

        <section id="recruit" class="section">
            <h2>運営募集</h2>
            <p>サーバーを一緒に盛り上げてくれる仲間を募集中です！</p>
            <a href="https://forms.google.com/..." class="btn">応募フォームへ</a>
        </section>

        <section id="blog" class="section">
            <h2>Admin日記</h2>
            <p>2026/06/12: 新しい国家プラグインを導入しました...</p>
            <a href="#" class="btn">過去の日記を読む</a>
        </section>

        <section id="staff" class="section">
            <h2>運営紹介</h2>
            <ul>
                <li><strong>Owner:</strong> サーバーの全権限保持者</li>
                <li><strong>Admin:</strong> 治安維持・イベント運営担当</li>
            </ul>
        </section>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SutoServer | Official Home</title>
    <style>
        /* 基本設定 */
        :root {
            --bg-color: #0a0a0a;
            --anarchy-color: #ff4d4d;
            --nations-color: #4d94ff;
            --accent-color: #00ffcc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: white;
            overflow-x: hidden;
        }

        /* 動く背景 */
        .background-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
            z-index: -1;
        }

        /* ヒーローセクション */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1627398242454-45a1465c2479?auto=format&fit=crop&q=80&w=1000') center/cover;
            border-bottom: 2px solid var(--accent-color);
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--accent-color);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #ccc;
            margin-top: 10px;
        }

        /* メインコンテンツ */
        .main-content {
            max-width: 1000px;
            margin: -50px auto 50px;
            padding: 0 20px;
        }

        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* カードデザイン */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            transition: 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .card h2 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        /* アナーキー鯖スタイル */
        .anarchy:hover {
            border-color: var(--anarchy-color);
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.3);
        }
        .anarchy h2 { color: var(--anarchy-color); }

        /* 国家鯖スタイル */
        .nations:hover {
            border-color: var(--nations-color);
            box-shadow: 0 0 30px rgba(77, 148, 255, 0.3);
        }
        .nations h2 { color: var(--nations-color); }

        /* ボタン */
        .btn-join {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: transparent;
            color: white;
            border: 1px solid white;
            border-radius: 50px;
            text-decoration: none;
            transition: 0.3s;
            font-weight: bold;
        }

        .anarchy .btn-join:hover { background: var(--anarchy-color); border-color: var(--anarchy-color); }
        .nations .btn-join:hover { background: var(--nations-color); border-color: var(--nations-color); }

        /* 外部リンクセクション */
        .external-links {
            margin-top: 60px;
            text-align: center;
        }

        .link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
            padding: 15px 40px;
            width: 200px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-color);
            text-decoration: none;
            border-radius: 10px;
            border: 1px solid var(--accent-color);
            font-weight: bold;
            transition: 0.3s;
        }

        .link-btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--accent-color);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 0.9rem;
        }

        /* スマホ対応 */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .server-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="background-animate"></div>

    <header>
        <h1>SUTOSERVER</h1>
        <p class="subtitle">―― 混沌か、秩序か。君が歴史を刻む番だ。</p>
    </header>

    <div class="main-content">
        <div class="server-grid">
            <div class="card anarchy">
                <h2>ANARCHY</h2>
                <p>ルールなし、慈悲なし。<br>この荒廃した世界で、君は生き残れるか。</p>
                <a href="#" class="btn-join">SERVER ENTER</a>
            </div>

            <div class="card nations">
                <h2>NATIONS</h2>
                <p>法を敷き、領土を広げよ。<br>仲間と共に最強の帝国を建国せよ。</p>
                <a href="#" class="btn-join">SERVER ENTER</a>
            </div>
        </div>

        <div class="external-links">
            <h3>INFORMATION</h3>
            <div class="button-group">
                <a href="https://status.sutoserver.com" target="_blank" class="link-btn">SERVER STATUS</a>
                <a href="https://rule.sutoserver.com" target="_blank" class="link-btn">SERVER RULES</a>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 SutoServer Community. All rights reserved.
    </footer>

</body>
</html>
